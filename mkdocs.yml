site_name: Coactra
site_description: Composable Python libraries for agent applications, durable work, memory, workspace state, and collaboration.
site_url: https://dataopsfusion.github.io/coactra/
repo_url: https://github.com/DataOpsFusion/coactra
repo_name: DataOpsFusion/coactra
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Example Catalog: getting-started/examples.md
  - API Index: API_INDEX.md
  - Examples:
      - Overview: examples/index.md
      - Basic Incident Triage: examples/basic-incident-triage.md
      - Composed Support Agent: examples/composed-support-agent.md
      - Offline Agent SDK: examples/offline-agent-sdk.md
      - Work Orders:
          - Work Order Lifecycle: examples/work-order-lifecycle.md
          - Procedure-Backed Work: examples/procedure-backed-work.md
      - Sample Projects:
          - Customer Support Memory: examples/customer-support-memory.md
          - Support Desk: examples/support-desk.md
          - Release Runner: examples/release-runner.md
          - Workspace Research Desk: examples/workspace-research-desk.md
          - Multi-Agent Policy: examples/multi-agent-policy.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Interfaces: concepts/interfaces.md
      - Library Map: concepts/library-map.md
      - Naming Migration: concepts/naming-migration.md
      - State and Storage: concepts/state-and-storage.md
      - Tenant Isolation: concepts/tenant-isolation.md
      - Security: concepts/security.md
  - Operations:
      - Production Guide: operations/production.md
      - Work Orders: operations/work-orders.md
      - Publishing: operations/publishing.md
  - Maintainers:
      - Target Architecture: maintainers/target-architecture.md
      - Roadmap: maintainers/roadmap.md
      - Release Policy: maintainers/release-policy.md
      - Improvement Backlog: maintainers/improvement-backlog.md
      - Workflow Design: maintainers/jobs-procedures.md
      - Agent Design: maintainers/agent-design.md
      - Team Design: maintainers/directory-design.md
      - Memory Design: maintainers/memory-design.md
      - AI Library Design: maintainers/ai-library-design.md
      - Planning:
          - Single Package Plan: maintainers/plans/single-package-consolidation-plan.md
          - Single Package Design: maintainers/plans/single-package-consolidation-design.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

site_name: Coactra
site_description: Python library for Agent applications. One door — Agent.create — with Team and Workflow coming.
site_url: https://dataopsfusion.github.io/coactra/
repo_url: https://github.com/DataOpsFusion/coactra
repo_name: DataOpsFusion/coactra
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Example Catalog: getting-started/examples.md
  - API Index: API_INDEX.md
  - Examples:
      - Overview: examples/index.md
      - Incident Response Handoff: examples/incident-response-handoff.md
      - Support Ticket Agent: examples/support-ticket-agent.md
      - Offline SRE Agent: examples/offline-sre-agent.md
      - Ticket Triage: examples/ticket-triage.md
      - Resolution Memory: examples/resolution-memory.md
      - Research Workspace: examples/research-workspace.md
      - Approval Routing: examples/approval-routing.md
      - Workflow Examples:
          - Release Work Lifecycle: examples/release-work-lifecycle.md
          - Procedure Runbook: examples/procedure-runbook.md
          - Release Checkpoint: examples/release-checkpoint.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Library Map: concepts/library-map.md
      - Naming Migration: concepts/naming-migration.md
      - State and Storage: concepts/state-and-storage.md
      - Tenant Isolation: concepts/tenant-isolation.md
      - Security: concepts/security.md
  - Operations:
      - Production Guide: operations/production.md
      - Work Orders: operations/work-orders.md
      - Publishing: operations/publishing.md
  - Maintainers:
      - Target Architecture: maintainers/target-architecture.md
      - Roadmap: maintainers/roadmap.md
      - Release Policy: maintainers/release-policy.md
      - Improvement Backlog: maintainers/improvement-backlog.md
      - Jobs Procedures: maintainers/jobs-procedures.md
      - Agent Design: maintainers/agent-design.md
      - Directory Design: maintainers/directory-design.md
      - Memory Design: maintainers/memory-design.md
      - AI Library Design: maintainers/ai-library-design.md
      - Planning:
          - Single Package Plan: maintainers/plans/single-package-consolidation-plan.md
          - Single Package Design: maintainers/plans/single-package-consolidation-design.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

# DEPRECATED: PyPI publishing moved to release.yml (tag-based Trusted Publishing).
# This workflow is retained for manual smoke builds only. Do not re-enable push-to-main
# publishing — it duplicates release.yml and risks accidental uploads on every merge.
name: Publish to PyPI (deprecated)

on:
  workflow_dispatch:

concurrency:
  group: publish-pypi-manual
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution (manual only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coactra

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build source and wheel distributions
        run: python -m build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: coactra/dist/
          if-no-files-found: error

  publish:
    name: Publish distribution (manual only — prefer release.yml tags)
    needs: build
    if: false  # disabled; use release.yml (`git tag v* && git push origin v*`) instead
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/coactra
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

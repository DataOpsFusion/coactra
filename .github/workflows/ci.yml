name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './coactra[dev]'
          python -m pip install -e './memory[dev]'
          python -m pip install -e './workspace[dev]'
          python -m pip install -e './orchestration[dev]'
          python -m pip install -e './agent[dev]'

      - name: Validate public API inventory
        run: python scripts/check_public_api.py

      - name: Validate adapter maturity manifest
        run: python scripts/check_adapter_maturity.py

      - name: Run dependency-light core tests
        run: make test-core

      - name: Install dependency-complete package lanes
        run: |
          python -m pip install -e './lib-ai[dev]'
          python -m pip install -e './organization[dev]'

      - name: Run lib-ai tests
        working-directory: lib-ai
        run: python -m pytest -q

      - name: Run organization tests
        working-directory: organization
        run: python -m pytest -q

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  minimal-install:
    name: Base install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base package only
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./coactra
          python -m pip install pytest

      - name: Run base install import smoke tests
        working-directory: coactra
        run: pytest -q tests/test_base_install.py

  clean-install:
    name: Clean wheel install and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Build, install into fresh venv, and run public examples
        run: python coactra/scripts/check_clean_install.py

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev and capability extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './coactra[all,dev,a2a]'

      - name: Run tests
        working-directory: coactra
        run: pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install './coactra[dev]'

      - name: Ruff
        working-directory: coactra
        run: ruff check src tests

      - name: Removed-path scan
        run: python coactra/scripts/check_no_legacy_paths.py

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: python -m pip install --upgrade pip mkdocs-material

      - name: Build docs strictly
        run: mkdocs build --strict

  live-gate:
    name: Live backend gate inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './coactra[dev]'

      - name: Report configured live backend checks
        run: python coactra/scripts/check_live_backends.py

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install typecheck tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install './coactra[dev]'

      - name: Pyright
        working-directory: coactra
        run: |
          pyright --outputjson > pyright.json
          python - <<'PY'
          import json
          import sys

          summary = json.load(open("pyright.json"))["summary"]
          errors = summary["errorCount"]
          print(f"pyright errors: {errors}")
          sys.exit(1 if errors else 0)
          PY

  build:
    name: Wheel and metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build distribution
        run: |
          rm -rf dist-all
          (cd coactra && uv build --out-dir ../dist-all)

      - name: Validate metadata with twine
        run: uvx twine check dist-all/*

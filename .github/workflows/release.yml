name: release

# Publish the single Coactra distribution to PyPI via OIDC Trusted Publishing.
# Trigger: push a tag matching v* (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# One-time setup: configure a Trusted Publisher (or pending publisher) for the
# `coactra` project name on PyPI, pointing at this repo + this workflow + the `pypi`
# See docs/operations/publishing.md.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (no stored tokens)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install release-gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './coactra[all,dev,a2a]' mkdocs-material

      - name: Run release gate
        run: make release-check

      - name: Build the coactra distribution
        run: |
          rm -rf dist-all
          (cd coactra && uv build --out-dir ../dist-all)

      - name: Validate metadata
        run: uvx twine check dist-all/*

      - name: Verify distribution version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import zipfile

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag[1:] if tag.startswith("v") else tag
          wheels = list(pathlib.Path("dist-all").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {len(wheels)}")

          with zipfile.ZipFile(wheels[0]) as archive:
              metadata_name = next(
                  name for name in archive.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              metadata = archive.read(metadata_name).decode()

          version = next(
              line.split(": ", 1)[1]
              for line in metadata.splitlines()
              if line.startswith("Version: ")
          )
          if version != expected:
              raise SystemExit(f"tag {tag} builds version {version}, expected {expected}")
          print(f"Release version verified: {version}")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-all/
